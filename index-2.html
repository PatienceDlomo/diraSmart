<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DiraSmart — AI Workplace Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,560;9..144,680&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#10231D;
  --paper:#F1F3EF;
  --panel:#FFFFFF;
  --line:#DCE2DA;
  --amber:#E2A33D;
  --clay:#B5563C;
  --sage:#52705C;
  --muted:#62706A;
  --radius:10px;
}
*{box-sizing:border-box;}
body{margin:0;}
html,body{height:100%;}
body{
  font-family:'Inter',sans-serif;
  background:var(--paper);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.display{
  font-family:'Fraunces',serif;
  letter-spacing:-0.01em;
  font-weight:560;
}
.mono{font-family:'IBM Plex Mono',monospace; letter-spacing:0.02em;}
button{font-family:inherit;}
a{color:inherit;}

.app{display:flex; min-height:100vh;}

/* ---- sidebar ---- */
.sidebar{
  width:248px;
  flex-shrink:0;
  background:var(--ink);
  color:#EDEFEA;
  display:flex;
  flex-direction:column;
  position:sticky;
  top:0;
  height:100vh;
}
.brand{
  padding:26px 22px 18px 22px;
  border-bottom:1px solid rgba(255,255,255,0.12);
}
.brand .mark{
  display:inline-flex; align-items:center; justify-content:center;
  min-width:34px; height:34px; padding:0 8px; border-radius:8px;
  background:var(--amber); color:var(--ink);
  font-family:'Fraunces',serif; font-weight:680; font-size:14.5px; letter-spacing:0.01em;
  margin-bottom:10px;
}
.brand h1{font-size:19px; margin:0 0 2px 0; color:#fff;}
.brand p{margin:0; font-size:11.5px; color:#A9B3AB; font-family:'IBM Plex Mono',monospace;}

nav{padding:14px 12px; flex:1; overflow-y:auto;}
.nav-section-label{
  font-family:'IBM Plex Mono',monospace;
  font-size:10.5px; text-transform:uppercase; letter-spacing:0.12em;
  color:#7E8C82; padding:14px 10px 6px 10px;
}
.nav-item{
  display:flex; align-items:center; gap:11px;
  width:100%; text-align:left; border:none; background:transparent;
  color:#D9DED9; padding:10px 10px; border-radius:8px;
  font-size:13.6px; cursor:pointer; margin-bottom:2px;
  transition:background .15s ease, color .15s ease;
}
.nav-item .num{
  font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:#6E7C73;
  width:16px;
}
.nav-item:hover{background:rgba(255,255,255,0.07); color:#fff;}
.nav-item.active{background:rgba(226,163,61,0.16); color:#fff;}
.nav-item.active .num{color:var(--amber);}
.nav-item .ic{width:17px; height:17px; flex-shrink:0;}

.sidebar-foot{
  padding:14px 18px 18px 18px; border-top:1px solid rgba(255,255,255,0.1);
  font-size:11px; color:#8B968E; font-family:'IBM Plex Mono',monospace; line-height:1.5;
}

/* ---- main ---- */
.main{flex:1; min-width:0; display:flex; flex-direction:column;}
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:18px 30px; border-bottom:1px solid var(--line);
  background:var(--paper); position:sticky; top:0; z-index:5;
}
.topbar h2{font-size:21px; margin:0;}
.topbar .sub{font-size:12.5px; color:var(--muted); margin-top:2px;}
.menu-btn{display:none; background:none; border:1px solid var(--line); border-radius:8px; padding:8px 10px; cursor:pointer;}

.content{padding:26px 30px 60px 30px; max-width:1100px; width:100%;}

.disclaimer{
  display:flex; gap:10px; align-items:flex-start;
  background:#FBF3E4; border:1px solid #EAD7AC; color:#6B5316;
  border-radius:8px; padding:11px 14px; font-size:12.5px; line-height:1.5; margin-bottom:22px;
}
.disclaimer b{font-weight:600;}

.grid2{display:grid; grid-template-columns:1fr 1fr; gap:20px;}
@media (max-width:880px){ .grid2{grid-template-columns:1fr;} }

.panel{
  background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
  padding:20px;
}
.panel h3{font-size:14px; margin:0 0 14px 0; display:flex; align-items:center; gap:8px;}
.panel h3 .tag{font-family:'IBM Plex Mono',monospace; font-size:10px; color:#fff; background:var(--sage); padding:2px 6px; border-radius:4px; font-weight:500;}

label{display:block; font-size:12px; font-weight:600; margin:0 0 6px 0; color:#34433A;}
input[type=text], textarea, select{
  width:100%; border:1px solid var(--line); border-radius:7px; padding:9px 11px;
  font-family:inherit; font-size:13.5px; background:#FCFCFB; color:var(--ink);
  resize:vertical;
}
input[type=text]:focus, textarea:focus, select:focus{
  outline:2px solid var(--amber); outline-offset:1px; border-color:var(--amber);
}
.field{margin-bottom:14px;}
.row{display:flex; gap:10px;}
.row > div{flex:1;}

.chip-group{display:flex; flex-wrap:wrap; gap:8px;}
.chip{
  border:1px solid var(--line); background:#FCFCFB; border-radius:20px; padding:7px 13px;
  font-size:12.5px; cursor:pointer; color:var(--muted);
}
.chip.active{background:var(--ink); color:#fff; border-color:var(--ink);}

.btn{
  display:inline-flex; align-items:center; gap:8px;
  background:var(--ink); color:#fff; border:none; border-radius:8px;
  padding:10px 18px; font-size:13.5px; font-weight:600; cursor:pointer;
  transition:background .15s;
}
.btn:hover{background:#264536;}
.btn:disabled{background:#A7B0AA; cursor:not-allowed;}
.btn.secondary{background:transparent; color:var(--ink); border:1px solid var(--line);}
.btn.secondary:hover{background:#F0F0EC;}

.output-area{
  min-height:180px; border:1px solid var(--line); border-radius:7px;
  padding:13px; font-size:13.5px; line-height:1.65; background:#FCFCFB;
  white-space:pre-wrap; color:var(--ink);
}
.output-area[contenteditable]:focus{outline:2px solid var(--amber); outline-offset:1px;}
.output-empty{color:#9AA39C; font-style:italic;}

.spinner{
  width:15px; height:15px; border-radius:50%;
  border:2px solid rgba(255,255,255,0.35); border-top-color:#fff;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

.out-actions{display:flex; gap:8px; margin-top:10px;}
.copied-note{font-size:11.5px; color:var(--sage); font-weight:600; align-self:center;}

/* Home cards */
.home-hero{
  border:1px solid var(--line); border-radius:14px; padding:32px;
  background:linear-gradient(135deg,#16291F 0%, #10231D 100%); color:#fff; margin-bottom:24px;
}
.home-hero h2{color:#fff; font-size:26px; margin:0 0 8px 0;}
.home-hero p{color:#C7D0C9; font-size:13.5px; max-width:520px; margin:0; line-height:1.6;}
.feature-cards{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:20px;}
@media (max-width:880px){.feature-cards{grid-template-columns:1fr 1fr;}}
@media (max-width:560px){.feature-cards{grid-template-columns:1fr;}}
.fcard{
  border:1px solid var(--line); border-radius:11px; padding:18px; background:var(--panel);
  cursor:pointer; transition:transform .12s, border-color .12s;
}
.fcard:hover{transform:translateY(-2px); border-color:var(--amber);}
.fcard .ic{width:26px; height:26px; margin-bottom:10px; color:var(--sage);}
.fcard h4{margin:0 0 5px 0; font-size:14.5px; font-family:'Fraunces',serif; font-weight:560;}
.fcard p{margin:0; font-size:12px; color:var(--muted); line-height:1.5;}

/* chatbot */
.chat-wrap{display:flex; flex-direction:column; height:540px; border:1px solid var(--line); border-radius:var(--radius); background:var(--panel); overflow:hidden;}
.chat-msgs{flex:1; overflow-y:auto; padding:18px; display:flex; flex-direction:column; gap:12px;}
.msg{max-width:75%; padding:10px 13px; border-radius:10px; font-size:13.5px; line-height:1.55; white-space:pre-wrap;}
.msg.user{align-self:flex-end; background:var(--ink); color:#fff; border-bottom-right-radius:3px;}
.msg.bot{align-self:flex-start; background:#F0F0EA; color:var(--ink); border-bottom-left-radius:3px;}
.chat-input{display:flex; gap:8px; padding:12px; border-top:1px solid var(--line);}
.chat-input textarea{flex:1; min-height:42px; max-height:120px;}

.task-list{display:flex; flex-direction:column; gap:8px;}
.task-row{display:flex; gap:8px; align-items:center;}
.task-row input[type=text]{flex:1;}
.remove-task{background:none; border:none; color:var(--clay); cursor:pointer; font-size:18px; line-height:1; padding:0 6px;}
.add-task{font-size:12.5px; color:var(--sage); background:none; border:none; cursor:pointer; font-weight:600; padding:4px 0;}

.priority-badge{display:inline-block; font-family:'IBM Plex Mono',monospace; font-size:10px; padding:2px 7px; border-radius:4px; margin-right:6px;}
.error-box{background:#FBEAE6; border:1px solid #E7BDAF; color:#8C3A22; padding:10px 13px; border-radius:7px; font-size:12.5px; margin-top:10px;}

::-webkit-scrollbar{width:9px; height:9px;}
::-webkit-scrollbar-thumb{background:#C9CFC6; border-radius:5px;}

@media (max-width:760px){
  .sidebar{position:fixed; left:-260px; z-index:50; transition:left .2s ease; box-shadow:0 0 30px rgba(0,0,0,0.3);}
  .sidebar.open{left:0;}
  .menu-btn{display:inline-flex;}
  .content{padding:20px 16px 50px 16px;}
  .topbar{padding:14px 16px;}
  .overlay{display:none; position:fixed; inset:0; background:rgba(0,0,0,0.35); z-index:40;}
  .overlay.show{display:block;}
}
</style>
</head>
<body>
<div class="app">

  <div class="overlay" id="overlay"></div>

  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="mark">DS</div>
      <h1>DiraSmart</h1>
      <p>AI WORKPLACE ASSISTANT</p>
    </div>
    <nav id="nav">
      <div class="nav-section-label">Overview</div>
      <button class="nav-item" data-view="home"><span class="num">·</span> Dashboard</button>
      <div class="nav-section-label">Tools</div>
      <button class="nav-item" data-view="email"><span class="num">01</span> Email Generator</button>
      <button class="nav-item" data-view="notes"><span class="num">02</span> Meeting Notes Summarizer</button>
      <button class="nav-item" data-view="planner"><span class="num">03</span> Task Planner</button>
      <button class="nav-item" data-view="research"><span class="num">04</span> Research Assistant</button>
      <button class="nav-item" data-view="chat"><span class="num">05</span> Workplace Chatbot</button>
    </nav>
    <div class="sidebar-foot">v1.0 — built with Claude API<br>Responsible AI by design</div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div style="display:flex; align-items:center; gap:12px;">
        <button class="menu-btn" id="menuBtn">☰</button>
        <div>
          <h2 id="viewTitle">Dashboard</h2>
          <div class="sub" id="viewSub">Your AI-powered workplace, in one place.</div>
        </div>
      </div>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>

<script>
const ic = {
  mail:`<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>`,
  notes:`<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 8h8M8 12h8M8 16h5"/></svg>`,
  planner:`<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>`,
  research:`<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>`,
  chat:`<svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>`
};

const views = {
  home:{title:"Dashboard", sub:"Your AI-powered workplace, in one place."},
  email:{title:"Smart Email Generator", sub:"Draft professional emails in any tone, instantly."},
  notes:{title:"Meeting Notes Summarizer", sub:"Turn long notes into clear actions and decisions."},
  planner:{title:"AI Task Planner", sub:"Generate a prioritized daily or weekly schedule."},
  research:{title:"AI Research Assistant", sub:"Summarize topics and surface key insights."},
  chat:{title:"Workplace Chatbot", sub:"Ask anything — drafting help, quick answers, brainstorming."}
};

let currentView = "home";

function disclaimer(){
  return `<div class="disclaimer">
    <span>⚠️</span>
    <div><b>Responsible AI use:</b> Outputs are AI-generated drafts. Review for accuracy, tone, and confidentiality before sending or acting on them. Avoid entering sensitive personal, financial, or client data.</div>
  </div>`;
}

async function callClaude(prompt, systemPrompt){
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-sonnet-4-6",
      max_tokens:1000,
      system: systemPrompt || "",
      messages:[{role:"user", content: prompt}]
    })
  });
  if(!res.ok){ throw new Error("API request failed ("+res.status+")"); }
  const data = await res.json();
  const text = (data.content||[]).map(b=>b.text||"").join("\n").trim();
  if(!text) throw new Error("Empty response from model.");
  return text;
}

function render(){
  document.getElementById("viewTitle").textContent = views[currentView].title;
  document.getElementById("viewSub").textContent = views[currentView].sub;
  document.querySelectorAll(".nav-item").forEach(b=>{
    b.classList.toggle("active", b.dataset.view===currentView);
  });
  const c = document.getElementById("content");
  if(currentView==="home") c.innerHTML = homeView();
  if(currentView==="email") c.innerHTML = emailView();
  if(currentView==="notes") c.innerHTML = notesView();
  if(currentView==="planner") c.innerHTML = plannerView();
  if(currentView==="research") c.innerHTML = researchView();
  if(currentView==="chat") c.innerHTML = chatView();
  attachHandlers();
}

function homeView(){
  const cards = [
    {v:"email", i:ic.mail, t:"Smart Email Generator", d:"Generate polished emails in formal, friendly, or persuasive tones from a few bullet points."},
    {v:"notes", i:ic.notes, t:"Meeting Notes Summarizer", d:"Paste raw notes and get a clean summary with decisions, action items, and deadlines."},
    {v:"planner", i:ic.planner, t:"AI Task Planner", d:"List your tasks and get a prioritized, time-blocked schedule for the day or week."},
    {v:"research", i:ic.research, t:"AI Research Assistant", d:"Drop in a topic or article text for a structured summary plus key takeaways."},
    {v:"chat", i:ic.chat, t:"Workplace Chatbot", d:"A general-purpose assistant for quick questions, drafting help, and brainstorming."}
  ];
  return `
    <div class="home-hero">
      <h2>One assistant, five workplace tools.</h2>
      <p>DiraSmart brings the everyday AI tasks — emails, notes, planning, research, and quick questions — into a single dashboard, so you're not switching between five different tabs.</p>
    </div>
    ${disclaimer()}
    <div class="feature-cards">
      ${cards.map(c=>`
        <div class="fcard" data-go="${c.v}">
          ${c.i}
          <h4>${c.t}</h4>
          <p>${c.d}</p>
        </div>`).join("")}
    </div>
  `;
}

function emailView(){
  return `
    ${disclaimer()}
    <div class="grid2">
      <div class="panel">
        <h3>Inputs <span class="tag">DRAFT</span></h3>
        <div class="field">
          <label>What is this email about?</label>
          <textarea id="email-points" rows="4" placeholder="e.g. Letting the team know the product launch is delayed by one week due to a vendor issue, new date is the 14th."></textarea>
        </div>
        <div class="row">
          <div class="field">
            <label>Recipient</label>
            <input type="text" id="email-recipient" placeholder="e.g. my manager / the whole team / a client">
          </div>
          <div class="field">
            <label>Audience type</label>
            <select id="email-audience">
              <option value="Client">Client</option>
              <option value="Manager">Manager</option>
              <option value="Team / colleagues">Team / colleagues</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label>Tone</label>
          <div class="chip-group" id="email-tone">
            <div class="chip active" data-val="Formal">Formal</div>
            <div class="chip" data-val="Friendly">Friendly</div>
            <div class="chip" data-val="Persuasive">Persuasive</div>
            <div class="chip" data-val="Apologetic">Apologetic</div>
          </div>
        </div>
        <button class="btn" id="email-generate">Generate email</button>
      </div>
      <div class="panel">
        <h3>Output <span class="tag">EDITABLE</span></h3>
        <div class="output-area" id="email-output" contenteditable="true"><span class="output-empty">Your generated email will appear here. You can edit it directly before copying.</span></div>
        <div class="out-actions">
          <button class="btn secondary" id="email-copy">Copy text</button>
          <span class="copied-note" id="email-copied" style="display:none;">Copied ✓</span>
        </div>
        <div id="email-error"></div>
      </div>
    </div>
  `;
}

function notesView(){
  return `
    ${disclaimer()}
    <div class="grid2">
      <div class="panel">
        <h3>Raw notes <span class="tag">INPUT</span></h3>
        <div class="field">
          <textarea id="notes-input" rows="14" placeholder="Paste your raw meeting notes or transcript here..."></textarea>
        </div>
        <button class="btn" id="notes-generate">Summarize notes</button>
      </div>
      <div class="panel">
        <h3>Summary <span class="tag">EDITABLE</span></h3>
        <div class="output-area" id="notes-output" contenteditable="true"><span class="output-empty">A structured summary — overview, decisions, action items with owners, and deadlines — will appear here.</span></div>
        <div class="out-actions">
          <button class="btn secondary" id="notes-copy">Copy text</button>
          <span class="copied-note" id="notes-copied" style="display:none;">Copied ✓</span>
        </div>
        <div id="notes-error"></div>
      </div>
    </div>
  `;
}

function plannerView(){
  return `
    ${disclaimer()}
    <div class="grid2">
      <div class="panel">
        <h3>Your tasks <span class="tag">INPUT</span></h3>
        <div class="field">
          <label>Plan for</label>
          <div class="chip-group" id="planner-range">
            <div class="chip active" data-val="day">Today</div>
            <div class="chip" data-val="week">This week</div>
          </div>
        </div>
        <div class="field">
          <label>Tasks</label>
          <div class="task-list" id="task-list">
            <div class="task-row"><input type="text" placeholder="e.g. Finish client proposal"></div>
            <div class="task-row"><input type="text" placeholder="e.g. Reply to vendor emails"></div>
            <div class="task-row"><input type="text" placeholder="e.g. Prep for 3pm standup"></div>
          </div>
          <button class="add-task" id="add-task">+ Add another task</button>
        </div>
        <div class="field">
          <label>Working hours (optional)</label>
          <input type="text" id="planner-hours" placeholder="e.g. 9am – 5:30pm">
        </div>
        <button class="btn" id="planner-generate">Build schedule</button>
      </div>
      <div class="panel">
        <h3>Schedule <span class="tag">EDITABLE</span></h3>
        <div class="output-area" id="planner-output" contenteditable="true"><span class="output-empty">A prioritized, time-blocked schedule will appear here.</span></div>
        <div class="out-actions">
          <button class="btn secondary" id="planner-copy">Copy text</button>
          <span class="copied-note" id="planner-copied" style="display:none;">Copied ✓</span>
        </div>
        <div id="planner-error"></div>
      </div>
    </div>
  `;
}

function researchView(){
  return `
    ${disclaimer()}
    <div class="grid2">
      <div class="panel">
        <h3>Topic or text <span class="tag">INPUT</span></h3>
        <div class="field">
          <label>Topic, question, or pasted article text</label>
          <textarea id="research-input" rows="11" placeholder="e.g. 'Latest approaches to async team communication' or paste a full article."></textarea>
        </div>
        <div class="field">
          <label>Focus (optional)</label>
          <input type="text" id="research-focus" placeholder="e.g. focus on pros/cons for a 10-person remote team">
        </div>
        <button class="btn" id="research-generate">Summarize & analyze</button>
      </div>
      <div class="panel">
        <h3>Insights <span class="tag">EDITABLE</span></h3>
        <div class="output-area" id="research-output" contenteditable="true"><span class="output-empty">A summary plus key insights and recommendations will appear here.</span></div>
        <div class="out-actions">
          <button class="btn secondary" id="research-copy">Copy text</button>
          <span class="copied-note" id="research-copied" style="display:none;">Copied ✓</span>
        </div>
        <div id="research-error"></div>
      </div>
    </div>
  `;
}

function chatView(){
  return `
    ${disclaimer()}
    <div class="chat-wrap">
      <div class="chat-msgs" id="chat-msgs">
        <div class="msg bot">Hi, I'm your workplace assistant. Ask me to draft something, explain a concept, brainstorm ideas, or help think through a work problem.</div>
      </div>
      <div class="chat-input">
        <textarea id="chat-text" placeholder="Type a message..."></textarea>
        <button class="btn" id="chat-send">Send</button>
      </div>
    </div>
  `;
}

function setLoading(btn, loading, label){
  if(loading){
    btn.disabled = true;
    btn.dataset.label = btn.innerHTML;
    btn.innerHTML = '<span class="spinner"></span> Working...';
  } else {
    btn.disabled = false;
    btn.innerHTML = btn.dataset.label || label;
  }
}

function showError(id, msg){
  document.getElementById(id).innerHTML = `<div class="error-box">${msg}</div>`;
}
function clearError(id){
  document.getElementById(id).innerHTML = "";
}

let chatHistory = [];

function attachHandlers(){
  document.querySelectorAll(".fcard").forEach(card=>{
    card.addEventListener("click", ()=>{ currentView = card.dataset.go; render(); });
  });

  // EMAIL
  if(currentView==="email"){
    document.querySelectorAll("#email-tone .chip").forEach(chip=>{
      chip.addEventListener("click", ()=>{
        document.querySelectorAll("#email-tone .chip").forEach(c=>c.classList.remove("active"));
        chip.classList.add("active");
      });
    });
    document.getElementById("email-generate").addEventListener("click", async ()=>{
      const btn = document.getElementById("email-generate");
      const points = document.getElementById("email-points").value.trim();
      const recipient = document.getElementById("email-recipient").value.trim() || "the recipient";
      const audience = document.getElementById("email-audience").value;
      const tone = document.querySelector("#email-tone .chip.active").dataset.val;
      clearError("email-error");
      if(!points){ showError("email-error","Please describe what the email is about."); return; }
      setLoading(btn,true);
      try{
        const sys = "You are a professional workplace writing assistant. Write clear, well-structured emails, and adapt vocabulary, formality, and level of detail to the stated audience type (Client: polished and reassuring; Manager: concise and outcome-focused; Team/colleagues: collaborative and direct). Output only the email (subject line + body), no preamble or explanation.";
        const prompt = `Write a ${tone.toLowerCase()}-tone email to ${recipient}, who is best described as: ${audience}.\n\nKey points to cover:\n${points}\n\nInclude a subject line. Keep it concise and workplace-appropriate, adapted to that audience.`;
        const result = await callClaude(prompt, sys);
        document.getElementById("email-output").textContent = result;
      }catch(e){ showError("email-error","Something went wrong generating the email: "+e.message); }
      setLoading(btn,false);
    });
    document.getElementById("email-copy").addEventListener("click", ()=>copyOutput("email-output","email-copied"));
  }

  // NOTES
  if(currentView==="notes"){
    document.getElementById("notes-generate").addEventListener("click", async ()=>{
      const btn = document.getElementById("notes-generate");
      const notes = document.getElementById("notes-input").value.trim();
      clearError("notes-error");
      if(!notes){ showError("notes-error","Please paste in your meeting notes first."); return; }
      setLoading(btn,true);
      try{
        const sys = "You are a meeting-notes summarization assistant. Output clean, structured plain text with these sections: Overview (2-3 sentences), Decisions Made (bullet list), Action Items (bullet list, each with an owner if mentioned and a deadline if mentioned), and Open Questions (bullet list, omit if none). No preamble.";
        const prompt = `Summarize these meeting notes:\n\n${notes}`;
        const result = await callClaude(prompt, sys);
        document.getElementById("notes-output").textContent = result;
      }catch(e){ showError("notes-error","Something went wrong summarizing the notes: "+e.message); }
      setLoading(btn,false);
    });
    document.getElementById("notes-copy").addEventListener("click", ()=>copyOutput("notes-output","notes-copied"));
  }

  // PLANNER
  if(currentView==="planner"){
    document.querySelectorAll("#planner-range .chip").forEach(chip=>{
      chip.addEventListener("click", ()=>{
        document.querySelectorAll("#planner-range .chip").forEach(c=>c.classList.remove("active"));
        chip.classList.add("active");
      });
    });
    document.getElementById("add-task").addEventListener("click", ()=>{
      const row = document.createElement("div");
      row.className = "task-row";
      row.innerHTML = `<input type="text" placeholder="Add a task"><button class="remove-task" title="Remove">×</button>`;
      document.getElementById("task-list").appendChild(row);
      row.querySelector(".remove-task").addEventListener("click", ()=>row.remove());
    });
    document.getElementById("planner-generate").addEventListener("click", async ()=>{
      const btn = document.getElementById("planner-generate");
      const tasks = Array.from(document.querySelectorAll("#task-list input")).map(i=>i.value.trim()).filter(Boolean);
      const range = document.querySelector("#planner-range .chip.active").dataset.val === "day" ? "today" : "this week";
      const hours = document.getElementById("planner-hours").value.trim();
      clearError("planner-error");
      if(tasks.length===0){ showError("planner-error","Please add at least one task."); return; }
      setLoading(btn,true);
      try{
        const sys = "You are a workplace task-planning assistant. Build a realistic, prioritized, time-blocked schedule as clean plain text. Rank tasks by priority (High/Medium/Low) based on urgency and importance, explain priority briefly, and end with a short 'Time-Saving Tip' suggesting one way to optimize the day (e.g. batching similar tasks, protecting focus time). No preamble.";
        const prompt = `Build a schedule for ${range}${hours ? " within working hours "+hours : ""}.\n\nTasks:\n${tasks.map(t=>"- "+t).join("\n")}\n\nPrioritize effectively, assign realistic time blocks, and briefly note why each task got its priority.`;
        const result = await callClaude(prompt, sys);
        document.getElementById("planner-output").textContent = result;
      }catch(e){ showError("planner-error","Something went wrong building the schedule: "+e.message); }
      setLoading(btn,false);
    });
    document.getElementById("planner-copy").addEventListener("click", ()=>copyOutput("planner-output","planner-copied"));
  }

  // RESEARCH
  if(currentView==="research"){
    document.getElementById("research-generate").addEventListener("click", async ()=>{
      const btn = document.getElementById("research-generate");
      const input = document.getElementById("research-input").value.trim();
      const focus = document.getElementById("research-focus").value.trim();
      clearError("research-error");
      if(!input){ showError("research-error","Please enter a topic or paste in some text."); return; }
      setLoading(btn,true);
      try{
        const sys = "You are a workplace research assistant. Your job is to make complex information fast to understand for a busy professional. Output structured plain text with: Summary (a short paragraph in plain, jargon-free language), Key Insights (bullet list, the 'so what' behind the facts), and Recommendations (bullet list, practical and workplace-relevant, written as concrete next actions). No preamble.";
        const prompt = `Research/summarize the following${focus ? ", with this focus: "+focus : ""}:\n\n${input}`;
        const result = await callClaude(prompt, sys);
        document.getElementById("research-output").textContent = result;
      }catch(e){ showError("research-error","Something went wrong: "+e.message); }
      setLoading(btn,false);
    });
    document.getElementById("research-copy").addEventListener("click", ()=>copyOutput("research-output","research-copied"));
  }

  // CHAT
  if(currentView==="chat"){
    const send = async ()=>{
      const ta = document.getElementById("chat-text");
      const text = ta.value.trim();
      if(!text) return;
      const msgs = document.getElementById("chat-msgs");
      msgs.insertAdjacentHTML("beforeend", `<div class="msg user">${escapeHtml(text)}</div>`);
      chatHistory.push({role:"user", content:text});
      ta.value = "";
      msgs.scrollTop = msgs.scrollHeight;
      const btn = document.getElementById("chat-send");
      setLoading(btn,true,"Send");
      msgs.insertAdjacentHTML("beforeend", `<div class="msg bot" id="chat-pending"><span class="spinner" style="border-color:rgba(16,35,29,0.2); border-top-color:#10231D;"></span></div>`);
      msgs.scrollTop = msgs.scrollHeight;
      try{
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({
            model:"claude-sonnet-4-6",
            max_tokens:1000,
            system:"You are a helpful, concise workplace assistant embedded in a productivity dashboard. Keep answers practical and to the point.",
            messages: chatHistory
          })
        });
        if(!res.ok) throw new Error("API request failed ("+res.status+")");
        const data = await res.json();
        const reply = (data.content||[]).map(b=>b.text||"").join("\n").trim() || "(no response)";
        chatHistory.push({role:"assistant", content:reply});
        document.getElementById("chat-pending").outerHTML = `<div class="msg bot">${escapeHtml(reply)}</div>`;
      }catch(e){
        document.getElementById("chat-pending").outerHTML = `<div class="msg bot">Sorry, something went wrong: ${escapeHtml(e.message)}</div>`;
      }
      msgs.scrollTop = msgs.scrollHeight;
      setLoading(btn,false,"Send");
    };
    document.getElementById("chat-send").addEventListener("click", send);
    document.getElementById("chat-text").addEventListener("keydown", (e)=>{
      if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); send(); }
    });
  }
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}

function copyOutput(outId, noteId){
  const el = document.getElementById(outId);
  const text = el.innerText;
  navigator.clipboard.writeText(text).then(()=>{
    const note = document.getElementById(noteId);
    note.style.display = "inline";
    setTimeout(()=>note.style.display="none", 1500);
  });
}

document.getElementById("nav").addEventListener("click", (e)=>{
  const btn = e.target.closest(".nav-item");
  if(!btn) return;
  currentView = btn.dataset.view;
  render();
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
});

document.getElementById("menuBtn").addEventListener("click", ()=>{
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("overlay").classList.toggle("show");
});
document.getElementById("overlay").addEventListener("click", ()=>{
  document.getElementById("sidebar").classList.remove("open");
  document.getElementById("overlay").classList.remove("show");
});

render();
</script>
</body>
</html>
